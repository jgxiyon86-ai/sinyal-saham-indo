<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Admin Emulator - Sinyal Saham Indo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/framer-motion/10.16.4/framer-motion.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #0d9488;
            /* Teal like Antibiotik Pro */
            --primary-dark: #0f766e;
            --surface: #ffffff;
            --background: #f1f5f9;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #0f172a;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .phone-frame {
            width: 380px;
            height: 780px;
            background: var(--background);
            border: 10px solid #1e293b;
            border-radius: 48px;
            position: relative;
            box-shadow: 0 50px 100px -20px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .notch {
            width: 140px;
            height: 28px;
            background: #1e293b;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 100;
        }

        .medical-header {
            background: #0d9488;
            padding: 40px 24px 30px 24px;
            color: white;
            border-bottom-left-radius: 30px;
            border-bottom-right-radius: 30px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            margin: -20px 16px 16px 16px;
            position: relative;
            z-index: 10;
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 6px;
        }

        .android-input {
            width: 100%;
            padding: 12px 16px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            outline: none;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .android-input:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            background: var(--primary);
            color: white;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-ghost {
            width: 100%;
            padding: 12px;
            border-radius: 16px;
            border: 1.5px solid #e2e8f0;
            color: #64748b;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
        }

        .scroll-area::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body class="bg-[#0f172a] m-0 p-0 flex items-center justify-center min-h-screen">
    <div id="fallback"
        style="position:fixed;inset:0;background:#0f172a;display:flex;align-items:center;justify-content:center;color:white;z-index:9999;">
        Initializing Emulator...</div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const FM = window.FramerMotion || { motion: { div: "div" }, AnimatePresence: ({ children }) => children };
        const { motion, AnimatePresence } = FM;

        const App = () => {
            const getApiBase = () => {
                const saved = localStorage.getItem('manual_api_base');
                if (saved) return saved;
                // Default to production online server
                return 'https://sinyal.cuanholic.com/api';
            };
            const [apiBase, setApiBase] = useState(getApiBase());

            const [page, setPage] = useState('login');
            const [tab, setTab] = useState('home'); // active tab: home, create, blast, profile
            const [status, setStatus] = useState(null);
            const [loading, setLoading] = useState(false);
            const [token, setToken] = useState(localStorage.getItem('admin_token'));
            const [selectedIds, setSelectedIds] = useState([]);
            const [signals, setSignals] = useState([]);
            const [tiers, setTiers] = useState([]);

            // Form States
            const [formData, setFormData] = useState({
                title: '', stock_code: '', signal_type: 'buy',
                entry_price: '', take_profit: '', stop_loss: '',
                published_at: new Date().toISOString().slice(0, 16),
                expires_at: new Date(Date.now() + 86400000).toISOString().slice(0, 16),
                tier_ids: []
            });

            // Auth Check
            useEffect(() => {
                if (token) setPage('main');
            }, []);

            useEffect(() => {
                const fb = document.getElementById('fallback');
                if (fb) fb.style.display = 'none';
            }, []);

            useEffect(() => {
                const trigger = () => {
                    if (window.lucide) {
                        lucide.createIcons();
                        // Double check after React likely finished its render cycle
                        setTimeout(() => lucide.createIcons(), 50);
                    } else {
                        setTimeout(trigger, 100);
                    }
                };
                trigger();
            }, [tab, page, signals]);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                const email = e.target.email.value;
                const password = e.target.password.value;

                try {
                    console.log('Attempting login to:', `${apiBase}/auth/login`);
                    const res = await fetch(`${apiBase}/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });
                    console.log('Response Status:', res.status);
                    const data = await res.json();
                    if (data.token) {
                        setToken(data.token);
                        localStorage.setItem('admin_token', data.token);
                        setPage('main');
                        showMsg({ text: 'Login Berhasil!', type: 'success' });
                    } else {
                        showMsg({ text: 'Login Gagal: ' + (data.message || 'Cek email/password'), type: 'error' });
                    }
                } catch (err) {
                    showMsg({ text: 'Error: ' + err.message + ' (Cek koneksi/path API)', type: 'error' });
                } finally {
                    setLoading(false);
                }
            };

            const fetchSignals = async () => {
                if (!token) return;
                try {
                    const res = await fetch(`${apiBase}/admin/signals`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.signals && data.signals.data) {
                        setSignals(data.signals.data);
                    }
                } catch (err) {
                    console.error('Fetch signals failed');
                }
            };

            const fetchTiers = async () => {
                if (!token) return;
                try {
                    const res = await fetch(`${apiBase}/admin/tiers`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    if (data.tiers) setTiers(data.tiers);
                } catch (err) {
                    console.error('Fetch tiers failed');
                }
            };

            useEffect(() => {
                if (page === 'main') {
                    fetchSignals();
                    fetchTiers();
                }
            }, [page]);

            const toggleId = (id) => {
                setSelectedIds(prev =>
                    prev.includes(id) ? prev.filter(i => i !== id) : [...prev, id]
                );
            };

            const handleBlast = async () => {
                if (selectedIds.length === 0) {
                    showMsg({ text: 'Error: Pilih sinyal dengan mencentang list di bawah!', type: 'error' });
                    return;
                }
                setLoading(true);
                try {
                    const res = await fetch(`${apiBase}/admin/signals/wa-blast`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            signal_ids: selectedIds,
                            tier_id: null
                        })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showMsg({
                            text: `Sukses: WA Blast diproses. Berhasil: ${data.sent || 0}, Gagal: ${data.failed || 0}`,
                            type: 'success'
                        });
                        setSelectedIds([]);
                    } else {
                        showMsg({ text: 'Gagal: ' + (data.message || 'Terjadi kesalahan sistem'), type: 'error' });
                    }
                } catch (err) {
                    showMsg({ text: 'Error: Koneksi terputus', type: 'error' });
                } finally {
                    setLoading(false);
                }
            };

            const handleCreateSignal = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`${apiBase}/admin/signals`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            ...formData,
                            tier_target: formData.tier_ids.length === 0 ? 'all' : null,
                            tier_ids: formData.tier_ids.length === 0 ? undefined : formData.tier_ids
                        })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        showMsg({ text: 'Sinyal Berhasil Dibuat!', type: 'success' });
                        fetchSignals();
                        // Reset form
                        setFormData({
                            title: '', stock_code: '', signal_type: 'buy',
                            entry_price: '', take_profit: '', stop_loss: '',
                            published_at: new Date().toISOString().slice(0, 16),
                            expires_at: new Date(Date.now() + 86400000).toISOString().slice(0, 16),
                            tier_ids: []
                        });
                        setTab('home'); // Pindah ke list setelah sukses
                    } else {
                        // Tampilkan detail error dari Laravel validation jika ada
                        const errorMsg = data.errors ? Object.values(data.errors).flat()[0] : (data.message || 'Cek kembali input');
                        showMsg({ text: 'Gagal: ' + errorMsg, type: 'error' });
                    }
                } catch (err) {
                    showMsg({ text: 'Error: Gagal terhubung ke server', type: 'error' });
                } finally {
                    setLoading(false);
                }
            };

            const handleDeleteSignal = async (id) => {
                if (!confirm('Hapus sinyal ini?')) return;
                setLoading(true);
                try {
                    const res = await fetch(`${apiBase}/admin/signals/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        showMsg({ text: 'Sinyal Terhapus', type: 'success' });
                        fetchSignals();
                    }
                } catch (err) {
                    showMsg({ text: 'Gagal menghapus', type: 'error' });
                } finally {
                    setLoading(false);
                }
            };

            const logout = () => {
                setToken(null);
                localStorage.removeItem('admin_token');
                setPage('login');
            };

            const showMsg = (statusObj) => {
                setStatus(statusObj);
                setTimeout(() => setStatus(null), 5000);
            };

            if (page === 'login') {
                return (
                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="phone-frame">
                        <div className="notch"></div>
                        <div className="flex-1 flex flex-col justify-center p-10 bg-white">
                            <div className="mb-10 text-center">
                                <div className="w-20 h-20 bg-teal-600 rounded-[2rem] mx-auto flex items-center justify-center mb-6 shadow-2xl shadow-teal-200">
                                    <i data-lucide="trending-up" className="text-white w-10 h-10"></i>
                                </div>
                                <p className="text-slate-400 text-sm mt-1">Sinyal Saham Indonesia</p>
                            </div>

                            <AnimatePresence>
                                {status && (
                                    <motion.div initial={{ y: -10, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ opacity: 0 }}
                                        className={`mb-6 p-3 rounded-xl text-[10px] font-bold border flex items-center gap-2 shadow-sm ${status.type === 'error' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-teal-50 text-teal-700 border-teal-100'}`}>
                                        <i data-lucide={status.type === 'error' ? "alert-circle" : "check-circle"} className="w-3 h-3"></i>
                                        <span className="flex-1">{status.text}</span>
                                    </motion.div>
                                )}
                            </AnimatePresence>

                            <form onSubmit={handleLogin} className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Email</label>
                                    <input type="email" name="email" placeholder="admin@sinyal.com" className="android-input !bg-slate-50" required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest px-1">Password</label>
                                    <input type="password" name="password" placeholder="••••••••" className="android-input !bg-slate-50" required />
                                </div>
                                <button type="submit" disabled={loading} className="btn-primary shadow-xl shadow-teal-100 mt-6">
                                    {loading ? 'Authenticating...' : 'Sign In'}
                                </button>
                                <div
                                    onClick={() => {
                                        const n = prompt('Enter API Base URL:', apiBase);
                                        if (n) {
                                            setApiBase(n);
                                            localStorage.setItem('manual_api_base', n);
                                        }
                                    }}
                                    className="mt-4 p-2 bg-slate-50 rounded text-[9px] text-slate-400 font-mono break-all text-center cursor-pointer hover:bg-slate-100">
                                    API: {apiBase}
                                </div>
                            </form>
                        </div>
                    </motion.div>
                );
            }

            return (
                <div className="phone-frame">
                    <div className="notch"></div>

                    <div className="scroll-area !pb-24">
                        <AnimatePresence>
                            {status && (
                                <motion.div initial={{ y: 20, opacity: 0 }} animate={{ y: 0, opacity: 1 }} exit={{ opacity: 0 }}
                                    className={`mx-4 mt-4 p-3 rounded-xl text-[11px] font-bold border flex items-center gap-2 shadow-sm ${status.type === 'error' ? 'bg-red-50 text-red-600 border-red-100' : 'bg-teal-50 text-teal-700 border-teal-100'}`}>
                                    <i data-lucide={status.type === 'error' ? "alert-circle" : "check-circle"} className="w-4 h-4"></i>
                                    <span className="flex-1">{status.text}</span>
                                </motion.div>
                            )}
                        </AnimatePresence>

                        <div className="medical-header">
                            <div className="flex justify-between items-center">
                                <div>
                                    <h1 className="text-xl font-bold">{tab === 'home' ? 'Riwayat Sinyal' : tab === 'create' ? 'Buat Sinyal' : tab === 'blast' ? 'WA Blast' : 'Profil Admin'}</h1>
                                    <p className="text-[10px] opacity-70 uppercase tracking-widest font-bold">Admin Panel v1.2</p>
                                </div>
                                <div className="flex gap-2">
                                    {tab === 'home' && (
                                        <button onClick={fetchSignals} className="p-2 bg-white/20 rounded-xl">
                                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /></svg>
                                        </button>
                                    )}
                                    <button onClick={() => setTab('profile')} className={`p-2 rounded-xl transition-all ${tab === 'profile' ? 'bg-white text-teal-600' : 'bg-white/20 text-white'}`}>
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></svg>
                                    </button>
                                    <button onClick={logout} className="p-2 bg-white/20 rounded-xl">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>
                                    </button>
                                </div>
                            </div>
                        </div>

                        {tab === 'create' && (
                            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="card mt-[-20px]">
                                <h2 className="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <i data-lucide="plus-circle" className="w-4 h-4 text-teal-600"></i> Data Sinyal Baru
                                </h2>
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    <div className="input-group mb-0">
                                        <label className="input-label">Kode Saham</label>
                                        <input className="android-input" placeholder="BBRI" value={formData.stock_code} onChange={e => setFormData({ ...formData, stock_code: e.target.value.toUpperCase() })} />
                                    </div>
                                    <div className="input-group mb-0">
                                        <label className="input-label">Tipe Sinyal</label>
                                        <div className="flex gap-1 pt-1">
                                            {['buy', 'sell', 'hold'].map(t => (
                                                <button key={t}
                                                    onClick={() => setFormData({ ...formData, signal_type: t })}
                                                    className={`flex-1 py-2 rounded-xl text-[10px] font-bold border transition-all ${formData.signal_type === t ? (t === 'buy' ? 'bg-green-600 border-green-600 text-white' : t === 'sell' ? 'bg-red-600 border-red-600 text-white' : 'bg-orange-500 border-orange-500 text-white') : 'bg-white border-slate-200 text-slate-400'}`}>
                                                    {t.toUpperCase()}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div className="input-group">
                                    <label className="input-label">Judul Sinyal</label>
                                    <input className="android-input" placeholder="Contoh: Swing Trading" value={formData.title} onChange={e => setFormData({ ...formData, title: e.target.value })} />
                                </div>

                                <div className="mb-4">
                                    <label className="input-label">Target Tier (Kosongkan jika Semua)</label>
                                    <div className="flex flex-wrap gap-2 pt-1">
                                        {tiers.map(t => (
                                            <button key={t.id}
                                                onClick={() => {
                                                    const newTiers = formData.tier_ids.includes(t.id)
                                                        ? formData.tier_ids.filter(id => id !== t.id)
                                                        : [...formData.tier_ids, t.id];
                                                    setFormData({ ...formData, tier_ids: newTiers });
                                                }}
                                                className={`px-3 py-1.5 rounded-full text-[10px] font-bold border transition-all ${formData.tier_ids.includes(t.id) ? 'bg-teal-600 border-teal-600 text-white shadow-md' : 'bg-white border-slate-200 text-slate-500'}`}>
                                                {t.name}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="grid grid-cols-3 gap-2 mb-4">
                                    <div className="input-group mb-0">
                                        <label className="input-label">Entry</label>
                                        <input type="number" className="android-input !px-2" placeholder="5000" value={formData.entry_price} onChange={e => setFormData({ ...formData, entry_price: e.target.value })} />
                                    </div>
                                    <div className="input-group mb-0">
                                        <label className="input-label">Take Profit</label>
                                        <input type="number" className="android-input !px-2" placeholder="5500" value={formData.take_profit} onChange={e => setFormData({ ...formData, take_profit: e.target.value })} />
                                    </div>
                                    <div className="input-group mb-0">
                                        <label className="input-label">Stop Loss</label>
                                        <input type="number" className="android-input !px-2" placeholder="4800" value={formData.stop_loss} onChange={e => setFormData({ ...formData, stop_loss: e.target.value })} />
                                    </div>
                                </div>

                                <div className="space-y-3 mb-6 p-3 bg-slate-50 rounded-2xl border border-slate-100">
                                    <h3 className="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">Penjadwalan</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="input-group mb-0">
                                            <label className="input-label">Publish At</label>
                                            <input type="datetime-local" className="android-input !text-[10px] !py-2" value={formData.published_at} onChange={e => setFormData({ ...formData, published_at: e.target.value })} />
                                        </div>
                                        <div className="input-group mb-0">
                                            <label className="input-label">Expired At</label>
                                            <input type="datetime-local" className="android-input !text-[10px] !py-2" value={formData.expires_at} onChange={e => setFormData({ ...formData, expires_at: e.target.value })} />
                                        </div>
                                    </div>
                                </div>

                                <button onClick={handleCreateSignal} disabled={loading} className="btn-primary">
                                    {loading ? 'Mengirim...' : 'Kirim Sinyal'} <i data-lucide="chevron-right" className="w-4 h-4"></i>
                                </button>

                                <button onClick={() => setFormData({
                                    title: '', stock_code: '', signal_type: 'buy',
                                    entry_price: '', take_profit: '', stop_loss: '',
                                    published_at: new Date().toISOString().slice(0, 16),
                                    expires_at: new Date(Date.now() + 86400000).toISOString().slice(0, 16),
                                    tier_ids: []
                                })} className="w-full mt-3 py-3 text-[11px] font-bold text-slate-400 uppercase tracking-widest">
                                    Bersihkan Draft
                                </button>
                            </motion.div>
                        )}

                        {tab === 'blast' && (
                            <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="card mt-[-20px]">
                                <h2 className="text-sm font-bold text-slate-800 mb-4 flex items-center gap-2">
                                    <i data-lucide="send" className="w-4 h-4 text-teal-600"></i> WA Blast Sinyal
                                </h2>
                                <p className="text-[10px] text-slate-400 mb-4 bg-teal-50 p-3 rounded-xl border border-teal-100 italic">
                                    Sinyal akan dikirimkan otomatis kepada client sesuai dengan Tier yang telah Bapak tentukan saat membuat sinyal tadi.
                                </p>
                                <div className="mb-6 p-4 bg-slate-50 rounded-2xl border border-slate-100 flex items-center justify-between">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase block leading-none mb-1">Terpilih</label>
                                        <div className="text-sm font-bold text-teal-600">
                                            {selectedIds.length} Sinyal
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedIds([])} className="text-[10px] font-bold text-red-400 uppercase">Batal</button>
                                </div>
                                <button onClick={handleBlast} disabled={loading || selectedIds.length === 0} className="btn-primary">
                                    {loading ? 'Memproses...' : 'Kirim Blast (WA)'} <i data-lucide="zap" className="w-4 h-4 text-yellow-300"></i>
                                </button>
                                {selectedIds.length === 0 && (
                                    <p className="text-center text-[10px] text-red-400 mt-3 font-bold">Pilih sinyal dulu di tab Aktif</p>
                                )}
                            </motion.div>
                        )}

                        {tab === 'home' && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="space-y-3 px-4 mt-[-20px]">
                                {signals
                                    .filter(s => !s.expires_at || new Date(s.expires_at) > new Date())
                                    .map(s => (
                                        <div key={s.id} className={`bg-white p-3 rounded-2xl shadow-sm border transition-all flex flex-col gap-2 ${selectedIds.includes(s.id) ? 'border-teal-500 bg-teal-50/20' : 'border-slate-100'}`}>
                                            <div className="flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <div onClick={() => toggleId(s.id)} className={`w-5 h-5 rounded-md border-2 flex items-center justify-center transition-all cursor-pointer ${selectedIds.includes(s.id) ? 'bg-teal-500 border-teal-500' : 'bg-white border-slate-200'}`}>
                                                        {selectedIds.includes(s.id) && <i data-lucide="check" className="text-white w-3.5 h-3.5"></i>}
                                                    </div>
                                                    <div className={`w-8 h-8 rounded-lg flex items-center justify-center font-bold text-[10px] ${s.signal_type.toUpperCase() === 'BUY' ? 'bg-green-100 text-green-600' : s.signal_type.toUpperCase() === 'SELL' ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600'}`}>
                                                        {s.stock_code.substring(0, 2)}
                                                    </div>
                                                    <div>
                                                        <div className="text-xs font-bold text-slate-800">{s.stock_code} <span className="text-[10px] text-slate-400 font-normal ml-1">#{s.id}</span></div>
                                                        <div className="text-[9px] text-slate-400 font-medium uppercase">{s.signal_type} • {new Date(s.published_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })} WIB</div>
                                                        <div className="flex flex-wrap gap-1 mt-1">
                                                            {s.tiers && s.tiers.length > 0 ? (
                                                                s.tiers.map(t => (
                                                                    <span key={t.id} className="bg-teal-50 text-teal-600 text-[7px] font-bold px-1.5 py-0.5 rounded-md border border-teal-100 uppercase">{t.name}</span>
                                                                ))
                                                            ) : (
                                                                <span className="bg-slate-50 text-slate-400 text-[7px] font-bold px-1.5 py-0.5 rounded-md border border-slate-100 uppercase">All Tiers</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                </div>
                                                <div className="flex gap-1">
                                                    <button onClick={() => {
                                                        const text = `SIGNAL ${s.stock_code}\n${s.signal_type.toUpperCase()}\nEntry: ${s.entry_price}\nTP: ${s.take_profit}\nSL: ${s.stop_loss}`;
                                                        navigator.clipboard.writeText(text);
                                                        showMsg({ text: 'Teks Sinyal Disalin', type: 'success' });
                                                    }} className="p-2 bg-slate-50 rounded-lg text-slate-400 hover:text-teal-600">
                                                        <i data-lucide="copy" className="w-3.5 h-3.5"></i>
                                                    </button>
                                                    <button onClick={() => { setSelectedIds([s.id]); setTab('blast'); }} className="p-2 bg-teal-50 rounded-lg text-teal-600">
                                                        <i data-lucide="send" className="w-3.5 h-3.5"></i>
                                                    </button>
                                                    <button onClick={() => handleDeleteSignal(s.id)} className="p-2 bg-red-50 rounded-lg text-red-400">
                                                        <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-3 gap-1 pt-2 border-t border-slate-50">
                                                <div className="text-center">
                                                    <div className="text-[8px] text-slate-400 uppercase font-bold">Entry</div>
                                                    <div className="text-[10px] font-bold text-slate-700">{s.entry_price || '-'}</div>
                                                </div>
                                                <div className="text-center border-x border-slate-50">
                                                    <div className="text-[8px] text-slate-400 uppercase font-bold">TP</div>
                                                    <div className="text-[10px] font-bold text-green-600">{s.take_profit || '-'}</div>
                                                </div>
                                                <div className="text-center">
                                                    <div className="text-[8px] text-slate-400 uppercase font-bold">SL</div>
                                                    <div className="text-[10px] font-bold text-red-500">{s.stop_loss || '-'}</div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                {signals.filter(s => !s.expires_at || new Date(s.expires_at) > new Date()).length === 0 && (
                                    <div className="text-center py-20 opacity-30">
                                        <i data-lucide="inbox" className="w-12 h-12 mx-auto mb-2"></i>
                                        <p className="text-xs">Tidak ada sinyal aktif</p>
                                    </div>
                                )}
                            </motion.div>
                        )}
                        {tab === 'profile' && (
                            <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }} className="px-4 mt-[-20px] pb-24">
                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100 mb-4 text-center">
                                    <div className="w-16 h-16 bg-teal-100 rounded-full mx-auto flex items-center justify-center mb-3">
                                        <i data-lucide="user" className="w-8 h-8 text-teal-600"></i>
                                    </div>
                                    <h2 className="text-base font-bold text-slate-800">Administrator</h2>
                                    <p className="text-[10px] text-slate-400 mb-4">misteranto@cuanholic.com</p>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                            <div className="text-[8px] font-bold text-slate-400 uppercase leading-none mb-1">Total Sinyal</div>
                                            <div className="text-base font-bold text-slate-800 leading-none">{signals.length}</div>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                            <div className="text-[8px] font-bold text-slate-400 uppercase leading-none mb-1">Total Client</div>
                                            <div className="text-base font-bold text-slate-800 leading-none">...</div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                                    <h3 className="text-xs font-bold text-slate-800 mb-4 flex items-center gap-2">
                                        <i data-lucide="lock" className="w-3.5 h-3.5 text-teal-600"></i> Ganti Password
                                    </h3>
                                    <div className="space-y-3">
                                        <div className="input-group mb-0">
                                            <label className="input-label">Password Lama</label>
                                            <input type="password" id="old_pass" className="android-input" placeholder="••••••••" />
                                        </div>
                                        <div className="input-group mb-0">
                                            <label className="input-label">Password Baru</label>
                                            <input type="password" id="new_pass" className="android-input" placeholder="Minimal 8 karakter" />
                                        </div>
                                        <div className="input-group mb-0">
                                            <label className="input-label">Konfirmasi Baru</label>
                                            <input type="password" id="new_pass_conf" className="android-input" placeholder="Ulangi password baru" />
                                        </div>
                                        <button
                                            onClick={async () => {
                                                const old = document.getElementById('old_pass').value;
                                                const n1 = document.getElementById('new_pass').value;
                                                const n2 = document.getElementById('new_pass_conf').value;
                                                if (!old || !n1) return showMsg({ text: 'Isi semua kolom', type: 'error' });
                                                if (n1 !== n2) return showMsg({ text: 'Konfirmasi password tidak cocok', type: 'error' });

                                                setLoading(true);
                                                try {
                                                    const res = await fetch(`${apiBase}/auth/change-password`, {
                                                        method: 'POST',
                                                        headers: {
                                                            'Content-Type': 'application/json',
                                                            'Accept': 'application/json',
                                                            'Authorization': `Bearer ${token}`
                                                        },
                                                        body: JSON.stringify({
                                                            old_password: old,
                                                            new_password: n1,
                                                            new_password_confirmation: n2
                                                        })
                                                    });
                                                    const data = await res.json();
                                                    if (res.ok) {
                                                        showMsg({ text: 'Password berhasil diganti', type: 'success' });
                                                        document.getElementById('old_pass').value = '';
                                                        document.getElementById('new_pass').value = '';
                                                        document.getElementById('new_pass_conf').value = '';
                                                    } else {
                                                        showMsg({ text: data.message || 'Gagal ganti password', type: 'error' });
                                                    }
                                                } catch (e) {
                                                    showMsg({ text: 'Gagal terhubung ke server', type: 'error' });
                                                } finally {
                                                    setLoading(false);
                                                }
                                            }}
                                            disabled={loading}
                                            className="btn-primary mt-2"
                                        >
                                            {loading ? 'Memproses...' : 'Update Password'}
                                        </button>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </div>

                    {/* Bottom Navigation */}
                    <div className="absolute bottom-6 left-6 right-6 h-16 bg-white/80 backdrop-blur-md shadow-2xl rounded-2xl flex items-center justify-around px-2 border border-white/20 z-50">
                        <button onClick={() => setTab('home')} className={`flex flex-col items-center gap-1 transition-all flex-1 ${tab === 'home' ? 'text-teal-600 scale-110' : 'text-slate-300 hover:text-slate-400'}`}>
                            <i data-lucide="layout-list" className="w-5 h-5"></i>
                            <span className="text-[8px] font-bold uppercase tracking-wider">Aktif</span>
                        </button>

                        <div className="flex-1 flex justify-center -mt-12 px-2">
                            <button onClick={() => setTab('create')} className={`w-14 h-14 rounded-full flex items-center justify-center transition-all bg-teal-600 text-white shadow-lg shadow-teal-200 active:scale-90 ${tab === 'create' ? 'ring-4 ring-teal-100' : 'opacity-90'}`}>
                                <i data-lucide="plus" className="w-8 h-8"></i>
                            </button>
                        </div>

                        <button onClick={() => setTab('blast')} className={`flex flex-col items-center gap-1 transition-all flex-1 ${tab === 'blast' ? 'text-teal-600 scale-110' : 'text-slate-300 hover:text-slate-400'}`}>
                            <i data-lucide="zap" className="w-5 h-5"></i>
                            <span className="text-[8px] font-bold uppercase tracking-wider">Blast</span>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // Emergency fallback: hide the loading screen after 5 seconds if React fails
        setTimeout(() => {
            const fb = document.getElementById('fallback');
            if (fb && fb.style.display !== 'none') {
                console.warn('React failed to mount in 5s, forcing display...');
                fb.style.display = 'none';
                document.getElementById('root').innerHTML = '<div style="color:white;padding:20px;text-align:center;">Gagal memuat emulator. Silakan refresh halaman (F5).</div>';
            }
        }, 5000);
    </script>
</body>

</html>
